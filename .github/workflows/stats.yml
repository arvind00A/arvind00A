name: Generate GitHub Stats Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Create dist folder
        run: mkdir -p dist

      - name: Download Stats Card
        run: |
          curl --max-time 30 -L -o dist/stats.svg \
          "https://github-readme-stats.vercel.app/api?username=arvind00a&show_icons=true&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=7c3aed&icon_color=7c3aed&text_color=c9d1d9&count_private=true"

      - name: Download Top Languages Card
        run: |
          curl --max-time 30 -L -o dist/top-langs.svg \
          "https://github-readme-stats.vercel.app/api/top-langs/?username=arvind00a&layout=compact&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=7c3aed&text_color=c9d1d9"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet || git commit -m "chore: update stats cards"
          git push
