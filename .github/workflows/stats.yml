name: Generate GitHub Stats Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Create dist folder
        run: mkdir -p dist

      - name: Download Stats Card
        run: |
          curl -o dist/stats.svg "https://github-stats.as93.net/api?username=arvind00a&theme=dark&show_icons=true"

      - name: Download Top Languages Card
        run: |
          curl -o dist/top-langs.svg "https://github-stats.as93.net/api/top-langs?username=arvind00a&theme=dark&layout=compact"

      - name: Download Streak Card
        run: |
          curl -o dist/streak.svg "https://streak-stats.demolab.com?user=arvind00a&theme=tokyonight&hide_border=true&background=0D1117&ring=7c3aed&fire=7c3aed&currStreakLabel=7c3aed"

      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: arvind00a
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet || git commit -m "chore: update stats cards"
          git push
