name: Generate GitHub Stats Cards

on:
  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight
  workflow_dispatch:        # lets you trigger it manually from GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate Stats Card
        uses: anuraghazra/github-readme-stats@master
        with:
          username: arvind00a
          card_type: stats
        env:
          PAT_1: ${{ secrets.GH_TOKEN }}

      - name: Generate Top Languages Card
        uses: anuraghazra/github-readme-stats@master
        with:
          username: arvind00a
          card_type: top-langs
        env:
          PAT_1: ${{ secrets.GH_TOKEN }}

      - name: Generate Streak Stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          user: arvind00a
        env:
          token: ${{ secrets.GH_TOKEN }}

      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: arvind00a
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet || git commit -m "chore: update stats and snake animation"
          git push
